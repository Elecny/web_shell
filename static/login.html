<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login - Web Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #1e1e2e;
            font-family: Menlo, Monaco, "Courier New", monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #181825;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
            border: 1px solid #313244;
            width: 340px;
        }
        h1 {
            color: #cdd6f4;
            font-size: 18px;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        input {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            background: #1e1e2e;
            border: 1px solid #45475a;
            color: #cdd6f4;
            font-size: 14px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #89b4fa; }
        input::placeholder { color: #585b70; }
        button {
            width: 100%;
            padding: 12px;
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        button:hover { background: #b4d0fb; }
        button:active { background: #74a8f7; }
        .error {
            color: #f38ba8;
            text-align: center;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Web Terminal</h1>
        <form method="post" action="/login">
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
